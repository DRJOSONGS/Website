
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhath Puja DJ Songs - DRJOSONGS.IN</title>
    <style>
        /* --- बेसिक सेटिंग (Background और Font) --- */
        /* हिंट: यहाँ min-height और flex जोड़ा गया है ताकि फुटर नीचे रहे */
        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            color: #000;
            display: flex;
            flex-direction: column;
        }
       
        /* मुख्य कंटेंट एरिया जो खाली जगह भरेगा */
        .content-wrapper { flex: 1 0 auto; }
        /* --- हेडर: मुख्य ब्रांड नाम और सब-हेडर --- */
        header { background-color: #b71c1c; color: white; padding: 15px; text-align: center; border-bottom: 4px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 30px; font-weight: 900; letter-spacing: 1px; }
        .sub-header { font-size: 13px; background: rgba(0,0,0,0.2); padding: 4px 15px; border-radius: 15px; display: inline-block; margin-top: 5px; font-weight: 600; text-transform: uppercase; }
       
        /* --- सेक्शन टाइटल --- */
        .section-title { background-color: #000; color: #fff; padding: 10px 15px; font-size: 13px; font-weight: bold; text-transform: uppercase; }
       
        /* --- सॉन्ग लिस्टिंग डिजाइन (इंडेक्स जैसा लाल बॉक्स) --- */
        .song-item { background: #fff; padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .song-item:hover { border-left: 6px solid #b71c1c; background-color: #fff9f9; }
       
        /* लाल MP3 बॉक्स */
        .mp3-icon {
            width: 35px; height: 35px; background-color: #b71c1c; color: white;
            display: flex; justify-content: center; align-items: center;
            border-radius: 3px; margin-right: 12px; font-size: 10px; font-weight: bold;
        }
       
        .song-info { display: flex; align-items: center; text-decoration: none; color: #b71c1c; font-weight: 600; font-size: 14px; }
       
        /* --- डाउनलोड बटन (Green) --- */
        .download-btn { background-color: #2e7d32; color: white; text-decoration: none; padding: 7px 15px; font-size: 12px; border-radius: 4px; font-weight: bold; border: 1px solid #1b5e20; }
       
        /* --- नेविगेशन बटन --- */
        .nav-container { text-align: center; margin: 30px 0; padding-bottom: 30px; display: flex; justify-content: center; gap: 12px; }
        .nav-btn { display: inline-block; padding: 10px 25px; background-color: #000; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .home-btn { background-color: #b71c1c; }
        .nav-btn:hover { transform: scale(1.05); opacity: 0.9; }
       
        /* --- फुटर (अब यह हमेशा नीचे रहेगा) --- */
        footer {
            flex-shrink: 0;
            background-color: #000; color: #888; text-align: center;
            padding: 25px; font-size: 12px; border-top: 3px solid #b71c1c;
        }
       
        /* मोबाइल रिस्पॉन्सिव */
        @media (max-width: 600px) {
            header h1 { font-size: 20px; }
            .song-info { font-size: 12px; }
            .nav-btn { padding: 8px 15px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="content-wrapper">
    <header>
        <h1>DRJOSONGS.IN</h1>
        <div class="sub-header">Chhath Puja DJ Song's</div>
    </header>
    <div class="section-title">Latest Track's:</div>
    <div class="nav-container">
        <a href="index.html" class="nav-btn home-btn">
            <svg style="width:18px; height:18px; vertical-align:middle; margin-right:5px; fill:white;" viewBox="0 0 24 24">
                <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
            </svg>
                Home
        </a>
        <a href="#" class="nav-btn">Next Page »</a>
    </div>
</div>
<footer>
    <div style="color:#b71c1c; font-weight:bold; font-size: 16px; margin-bottom: 5px;">DRJOSONGS.IN</div>
    <div>Copyright © 2026 Reserved by DRJO</div>
</footer>
<script>
    async function loadChhathSongs() {
        try {
            const response = await fetch('index.html');
            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            // इंडेक्स से सिर्फ 'chhath-puja' वाले गाने चुनना
            const chhathSongs = doc.querySelectorAll('.update-item.chhath-puja');
            const listArea = document.querySelector('.section-title');
            chhathSongs.forEach(song => {
                const cleanSong = song.cloneNode(true);
               
                // डिजाइन को कैटेगरी पेज जैसा सेट करना
                cleanSong.className = 'song-item';
               
                // लाल बॉक्स को वापस लाना
                const icon = cleanSong.querySelector('.update-icon');
                if(icon) {
                    icon.className = 'mp3-icon';
                    icon.innerText = 'MP3';
                }
                // गाने को टाइटल के नीचे जोड़ना
                listArea.after(cleanSong);
            });
        } catch (e) {
            console.log("Loading Complete...");
        }
    }
    window.onload = loadChhathSongs;
</script>
</body>
</html>
